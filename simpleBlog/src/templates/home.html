{% extends "base.html" %} {% block title %} home {% endblock %} {% block
content%}

<div class="container mt-5" align="center">
    <p class="h1 border-1">Hello {{current_user.user_name}}</p>
</div>

{%for post in posts%}
<div class="card mt-3">
    <div class="btn-group btn-sm ms-auto" algin="left">
        <button
            type="button"
            class="btn btn-secondary dropdown-toggle"
            data-bs-toggle="dropdown"
            aria-expanded="false"
        >
            ⋮
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
            <li>
                <button class="dropdown-item" id="delete_post" type="button">
                    delete post
                </button>
            </li>
        </ul>
    </div>
    <div class="card-body">
        <h5 class="card-title">{{post.post_content}}</h5>
        <p class="card-text small">Author: {{post.username}}</p>
        <a href="#" class="link small">Author</a>
    </div>
</div>
{%endfor%} {% endblock %}
